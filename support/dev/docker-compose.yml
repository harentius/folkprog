version: '3.7'


volumes:
    folkprog_mysql_data: ~

services:
    folkprog:
        image: harentius/blog-bundle-base
        volumes:
            - ./:/app
            - ./support/dev/nginx.vh.conf:/etc/nginx/conf.d/default.conf:ro
        links:
            - mysql
        environment:
            DATABASE_HOST: mysql
            DATABASE_PORT: 3306
            DATABASE_NAME: folkprog
            DATABASE_USER: root
            DATABASE_PASSWORD: 1111
        ports:
          - 9000:80
    mysql:
        image: mysql:5.7
        volumes:
            - folkprog_mysql_data:/var/lib/mysql
        environment:
            MYSQL_ROOT_PASSWORD: 1111
            MYSQL_PASSWORD: 1111
            MYSQL_DATABASE: folkprog
        command: mysqld --sql-mode=''
